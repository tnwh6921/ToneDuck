<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToneDuck: 廣東話聲調練習平台</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <div class="container" style="display: flex; justify-content: space-between; align-items: flex-start;">
            <div>
                <h1>🎓 ToneDuck: 廣東話聲調練習平台</h1>
                <p class="subtitle">學習廣東話聲調的互動課程</p>
            </div>
            <div id="languageToggle" style="cursor: pointer; background: var(--primary-color); color: white; padding: 0.3rem 0.6rem; border-radius: var(--border-radius); font-weight: bold; font-family: sans-serif; margin-top: 1rem;">
                <span id="langTrad" style="opacity: 1; margin-right: 0.2rem;">繁</span>
                <span style="opacity: 0.5;">|</span>
                <span id="langSimp" style="opacity: 0.5; margin-left: 0.2rem;">简</span>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="intro">
            <h2>歡迎！</h2>
            <p>透過以下單元學習廣東話聲調，課程包含：</p>
            <ul>
                <li>介紹聲調特點</li>
                <li>聲調單字及雙音節練習</li>
                <li>互動選擇題</li>
                <li>聲音錄製及音高曲線對比</li>
            </ul>
        </section>

        <section class="lessons-grid" id="lessonsContainer">
            <!-- Lessons will be dynamically loaded here -->
        </section>
    </main>

    <footer>
        <div class="container">
            <p>© 2026 Cantonese Jyutping Tutorial</p>
        </div>
    </footer>

    <script type="module" src="js/app.js"></script>
</body>
</html>
